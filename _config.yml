# Welcome to Jekyll!
# Jekyll Text Theme 博客全局配置
# 适配仓库：wui-git / wuli-git.fulloon.io
# 访问地址：https://wui-git.github.io/wuli-git.fulloon.io/

## 站点基础设置
text_skin: forest
highlight_theme: default

url     : https://wui-git.github.io
baseurl : /wuli-git.fulloon.io

title   : 诗意人间 | 浪漫自律小栈
description: >
  以文字栖居，做一个诗意温柔、自律向上的人。

## 语言与时区
lang: zh-CN
timezone: Asia/Shanghai

## 作者信息 & 社交链接
author:
  type      : person
  name      : wuli
  avatar    : /assets/头像.png
  bio       : 心怀诗意，自律自愈，慢慢发光。
  email     :
  github    : wui-git
  weibo     :
  zhihu     :

## GitHub 仓库关联
repository: wui-git/wuli-git.fulloon.io
repository_tree: master

## 页面路径配置
paths:
  root    : /
  home    : /
  archive : /archive.html
  rss     : /feed.xml

## 文章全局设置
excerpt_separator: <!--more-->
license: CC-BY-NC-4.0

toc:
  selectors: h1,h2,h3

## 拓展功能：公式 / 流程图 / 图表
mathjax: true
mathjax_autoNumber: true
mermaid: true
chart: true

## 分页设置
paginate: 6
paginate_path: /page:num

## 资源源
sources: bootcdn

## 分享功能
sharing:
  provider: addtoany

## 评论系统 Valine
comments:
  provider: valine
  valine:
    app_id      : Favohrffq0ZtxDphpXUChnqd-gzGzoHsz
    app_key     : UYaxXCIA2w4u0bNHJGboO4nn
    placeholder : 留下一句感想，不负遇见～

## 文章阅读量统计
pageview:
  provider: leancloud
  leancloud:
    app_id    : Favohrffq0ZtxDphpXUChnqd-gzGzoHsz
    app_key   : UYaxXCIA2w4u0bNHJGboO4nn
    app_class : test

## 站内搜索
search:
  provider: default

## 统计分析
analytics:
  provider: false

## 编译构建规则
markdown    : kramdown
highlighter : rouge
permalink   : date

exclude:
  - CHANGELOG.md
  - HOW_TO_RELEASE.md
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - gulpfile.js
  - jekyll-text-theme.gemspec
  - package-lock.json
  - package.json
  - /docs
  - /node_modules
  - /screenshots
  - /test
  - /vendor

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: article
      sharing: true
      license: true
      aside:
        toc: true
      show_edit_on_github: true
      pageview: true

## 插件依赖
plugins:
  - jekyll-feed
  - jekyll-paginate
  - jekyll-sitemap
  - jemoji