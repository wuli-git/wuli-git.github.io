## => Site Settings
##############################
text_skin: forest
highlight_theme: tomorrow
url     : https://wui-git.github.io
baseurl : /fox-lulloon.io
title   : Fox 小栖
description: >
  一个诗意，浪漫，自律的人

## => Language and Timezone
##############################
lang: zh-CN
timezone: Asia/Shanghai

## => Author and Social
##############################
author:
  type      : person
  name      : wuli
  url       : https://wui-git.github.io
  avatar    : /assets/头像.png
  bio       : 做一个诗意，浪漫，自律的人。
  email     : 1328433750@qq.com
  facebook  :
  twitter   :
  weibo     :
  googleplus:
  telegram  :
  medium    :
  zhihu     :
  douban    :
  linkedin  :
  github    : wui-git
  npm       :

## => GitHub Repository
##############################
repository: wui-git/fox-lulloon.io
repository_tree: master

## => Paths
##############################
paths:
  root    : /
  home    : /
  archive : /archive.html
  rss     : /feed.xml

## => Post
##############################
excerpt_separator: <!--more-->
license: CC-BY-NC-4.0

toc:
  selectors: h1,h2,h3

## => Markdown Enhancements
##############################
mathjax: true
mathjax_autoNumber: true
mermaid: true
chart: true

## => Paginate
##############################
paginate: 6
paginate_path: /page:num

## => Sources
##############################
sources: bootcdn

## => Sharing
##############################
sharing:
  provider: addtoany

  addthis:
    id: AddThis

## => Comments
##############################
comments:
  provider: valine

  valine:
    app_id      : Favohrffq0ZtxDphpXUChnqd-gzGzoHsz
    app_key     : UYaxXCIA2w4u0bNHJGboO4nn
    placeholder: 山野辽阔，有幸相逢～
    visitor     :
    meta        :

## => Pageview
##############################
pageview:
  provider: leancloud

  leancloud:
    app_id    : Favohrffq0ZtxDphpXUChnqd-gzGzoHsz
    app_key   : UYaxXCIA2w4u0bNHJGboO4nn
    app_class : test

## => Search
##############################
search:
  provider: default

## => Analytics
##############################
analytics:
  provider: false

## => Build
##############################
markdown    : kramdown
highlighter : rouge
permalink   : date

exclude:
  - CHANGELOG.md
  - HOW_TO_RELEASE.md
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README-*.md
  - README.md
  - gulpfile.js
  - jekyll-text-theme.gemspec
  - package-lock.json
  - package.json
  - /docs
  - /node_modules
  - /screenshots
  - /test
  - /vendor

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: article
      sharing: true
      license: true
      aside:
        toc: true
      show_edit_on_github: true
      show_subscribe: true
      pageview: true

## => Plugins
##############################
plugins:
  - jekyll-feed
  - jekyll-paginate
  - jekyll-sitemap
  - jemoji